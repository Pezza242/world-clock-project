<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock Project</title>
</head>
<body>
      <div id="box">
      <header>
        <h1>World clock</h1>
      </header>

      <select>
        <option id="city">Select a city...</option>
        <option id="paris">Paris</option>
        <option id="london">London</option>
        <option id="sydney">Sydney</option>
        <option id="new-york">New york</option>
        <option id="tokyo">Tokyo</option>
      </select>
      <main id="city-container">
        <section>
          <h2 id="city-name">Paris</h2>
          <p id="city-date">5th May 2026</p>
          <div id="city-time">10:15:00AM</div>
        </section>
      </main>
      <footer>
        This was coded by
        <a
          href="https://github.com/Pezza242"
          target="_blank"
          rel="noopener noreferrer"
          >Peri Williams-Yearwood</a
        >, is open-sourced on Github, and is hosted on Netlify
      </footer>
</body>
</html>
