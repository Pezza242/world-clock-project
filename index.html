<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Edu+AU+VIC+WA+NT+Guides:wght@400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,200;1,200&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <title>World Clock Project</title>
</head>
<body>
      <div id="box">
      <header id="box-header">
        <h1>World Clocks</h1>
      </header>
      <main id="city-container">
      <select id="select">
        <option id="city">Select a city...</option>
        <option id="current">My Current Location</option>
        <option id="paris" value="Europe/Paris">Paris</option>
        <option id="london" value="Europe/London">London</option>
        <option id="sydney" value="Australia/Sydney">Sydney</option>
        <option id="new-york" value="America/New_York">New York</option>
        <option id="tokyo" value="Asia/Tokyo">Tokyo</option>
      </select>

        <section id="city-section">
        </section>
      </main>
      <footer id="footer-box">
        This was coded by

          rel="noopener noreferrer"
          >Peri Williams-Yearwood</a
        >, is open-sourced on Github, and is hosted on Netlify
      </footer>
      <script src="src/index.js"></script>
